research_topics:
  - "LFP cycle life degradation"
  - "solid electrolyte interphase formation"
  - "silicon anode volume expansion"
  # add your own topics here

subagents:
  arxiv:
    enabled: true
    schedule: "interval:hours=12"  # run every 12 hours
  semantic_scholar:
    enabled: true
    schedule: "interval:hours=6"   # run every 6 hours
  openalex:
    enabled: false
    schedule: "interval:days=1"    # run daily
  pubmed:
    enabled: false
    schedule: "interval:days=1"
  unpaywall:
    enabled: false
    schedule: "interval:hours=24"
  firecrawl:
    enabled: false
    schedule: "interval:hours=4"
  google_scholar:
    enabled: false
    schedule: "interval:days=1"
  # schedule format: "interval:<unit>=<value>" where unit is seconds/minutes/hours/days
  # or "on-demand" to disable automatic scheduling (manual trigger only)
