version: "3.9"

services:
  gateway:
    build: .
    container_name: biblioteca-gateway
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN:-}
      - CF_ACCESS_AUD_TAG=${CF_ACCESS_AUD_TAG:-}
      - GATEWAY_CORS_ORIGINS=${GATEWAY_CORS_ORIGINS:-[]}
      - PYTHONPATH=/app/src
      - ROOT_DIR=/app
    command: ["uv", "run", "llm-rag", "serve", "--host", "0.0.0.0", "--port", "8443"]
    depends_on:
      - chroma

  dashboard:
    build: .
    container_name: biblioteca-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN:-}
      - CF_ACCESS_AUD_TAG=${CF_ACCESS_AUD_TAG:-}
      - PYTHONPATH=/app/src
      - BIBLIOTECA_HOME=/app
    command:
      ["uv", "run", "python", "-m", "uvicorn", "web.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  chroma:
    image: chromadb/chroma:latest
    container_name: biblioteca-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  chroma-data:
