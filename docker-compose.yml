version: "3.9"

services:
  biblioteca:
    build: .
    container_name: biblioteca
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.biblioteca:/app/data
    environment:
      - BIBLIOTECA_HOME=/app/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    command: ["web", "run"]

